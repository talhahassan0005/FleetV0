<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>FleetXchange Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1920px; height: 1080px;
  overflow: hidden;
  background: #060e1f;
  font-family: 'Barlow', sans-serif;
}

/* ── Base layers ── */
.layer { position: absolute; inset: 0; }

/* Deep radial glow — bottom-left (Africa origin feel) */
#glow-bl {
  background: radial-gradient(ellipse 900px 700px at 18% 80%, rgba(26,42,94,0.85) 0%, transparent 70%);
}
/* Accent glow — top right */
#glow-tr {
  background: radial-gradient(ellipse 700px 500px at 85% 10%, rgba(58,181,74,0.07) 0%, transparent 65%);
}
/* Green pulse — centre-right (where login card would be) */
#glow-cr {
  background: radial-gradient(ellipse 500px 400px at 72% 52%, rgba(58,181,74,0.05) 0%, transparent 60%);
}

/* ── Grid / graph-paper overlay ── */
#grid {
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ── Diagonal slash accents ── */
#slashes {
  overflow: hidden;
}
#slashes::before,
#slashes::after {
  content: '';
  position: absolute;
  background: linear-gradient(90deg, transparent, rgba(58,181,74,0.12), transparent);
  height: 1px;
  width: 200%;
  left: -50%;
}
#slashes::before {
  top: 38%;
  transform: rotate(-8deg);
}
#slashes::after {
  top: 62%;
  transform: rotate(-8deg);
  opacity: 0.5;
}

/* ── SVG canvas ── */
#canvas {
  width: 1920px;
  height: 1080px;
  position: absolute;
  inset: 0;
}

/* ── Watermark logo ── */
#watermark {
  position: absolute;
  bottom: 48px;
  left: 56px;
  z-index: 10;
}
#watermark img {
  width: 220px;
  opacity: 0.18;
  filter: grayscale(0.3);
}

/* ── Tagline ── */
#tagline {
  position: absolute;
  bottom: 52px;
  right: 60px;
  z-index: 10;
  text-align: right;
}
#tagline .main {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.15);
  text-transform: uppercase;
}
#tagline .sub {
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(58,181,74,0.25);
  text-transform: uppercase;
  margin-top: 3px;
}

/* ── Top bar ── */
#topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #3ab54a 0%, rgba(58,181,74,0.3) 40%, transparent 70%);
  z-index: 10;
}
</style>
</head>
<body>

<div class="layer" id="glow-bl"></div>
<div class="layer" id="glow-tr"></div>
<div class="layer" id="glow-cr"></div>
<div class="layer" id="grid"></div>
<div class="layer" id="slashes"></div>

<svg id="canvas" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Node glow filter -->
    <filter id="glow-green" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-line" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animated dash for route lines -->
    <style>
      .route { stroke-dasharray: 8 18; animation: dash 3s linear infinite; }
      .route-slow { stroke-dasharray: 6 24; animation: dash 5s linear infinite; }
      .route-fast { stroke-dasharray: 4 12; animation: dash 2s linear infinite; }
      .pulse-ring { animation: ring 2.5s ease-out infinite; transform-origin: center; }
      .pulse-ring-2 { animation: ring 2.5s ease-out infinite 1.2s; transform-origin: center; }
      @keyframes dash { to { stroke-dashoffset: -100; } }
      @keyframes ring {
        0% { opacity: 0.8; r: 4px; }
        100% { opacity: 0; r: 22px; }
      }
      .fade-in { animation: fadeIn 2s ease forwards; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      /* Travelling dot along paths */
      .traveller { animation: travel 4s linear infinite; }
      .traveller-2 { animation: travel 6s linear infinite 1s; }
      .traveller-3 { animation: travel 5s linear infinite 2.5s; }
      @keyframes travel {
        0% { offset-distance: 0%; opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }
    </style>
  </defs>

</svg>
